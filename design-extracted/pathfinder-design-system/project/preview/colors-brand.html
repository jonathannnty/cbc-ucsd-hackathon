<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{width:120px;border-radius:12px;overflow:hidden;border:1px solid var(--outline-variant);background:#fff;font-family:var(--font-body)}
  .chip{height:64px;display:block}
  .meta{padding:8px 10px}
  .name{font-size:12px;font-weight:600;color:var(--on-surface)}
  .hex{font-size:11px;color:var(--on-surface-variant);font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="row">
  <div class="sw"><span class="chip" style="background:#9c3f12"></span><div class="meta"><div class="name">primary</div><div class="hex">#9c3f12</div></div></div>
  <div class="sw"><span class="chip" style="background:#bc5629"></span><div class="meta"><div class="name">primary-container</div><div class="hex">#bc5629</div></div></div>
  <div class="sw"><span class="chip" style="background:#ffdbce"></span><div class="meta"><div class="name">primary-fixed</div><div class="hex">#ffdbce</div></div></div>
  <div class="sw"><span class="chip" style="background:#ffb598"></span><div class="meta"><div class="name">primary-fixed-dim</div><div class="hex">#ffb598</div></div></div>
  <div class="sw"><span class="chip" style="background:#39693b"></span><div class="meta"><div class="name">secondary</div><div class="hex">#39693b</div></div></div>
  <div class="sw"><span class="chip" style="background:#b8edb3"></span><div class="meta"><div class="name">secondary-container</div><div class="hex">#b8edb3</div></div></div>
  <div class="sw"><span class="chip" style="background:#6f5832"></span><div class="meta"><div class="name">tertiary</div><div class="hex">#6f5832</div></div></div>
  <div class="sw"><span class="chip" style="background:#fedead"></span><div class="meta"><div class="name">tertiary-fixed</div><div class="hex">#fedead</div></div></div>
</div>
</body></html>
