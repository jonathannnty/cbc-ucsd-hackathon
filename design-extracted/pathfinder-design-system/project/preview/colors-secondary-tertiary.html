<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .swatch{flex:1;min-width:120px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--outline-variant)}
  .chip{padding:14px 12px 12px;display:flex;flex-direction:column;gap:2px;height:64px}
  .name{font-weight:700;font-size:14px}
  .hex{font-size:12px;opacity:.85;font-variant-numeric:tabular-nums;text-transform:uppercase}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#39693b;color:#fff"><div class="name">secondary</div><div class="hex">#39693B</div></div></div>
    <div class="swatch"><div class="chip" style="background:#b8edb3;color:#3e6d3e"><div class="name">secondary-container</div><div class="hex">#B8EDB3</div></div></div>
    <div class="swatch"><div class="chip" style="background:#6f5832;color:#fff"><div class="name">tertiary</div><div class="hex">#6F5832</div></div></div>
    <div class="swatch"><div class="chip" style="background:#fedead;color:#281900"><div class="name">tertiary-fixed</div><div class="hex">#FEDEAD</div></div></div>
  </div>
</body></html>
