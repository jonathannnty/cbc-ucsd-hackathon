<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  header{display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:80px;background:var(--surface);border-bottom:1px solid var(--outline-variant);border-radius:12px}
  .brand{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--primary);letter-spacing:-0.02em}
  .right{display:flex;align-items:center;gap:16px}
  .lang{display:flex;align-items:center;gap:8px;color:var(--on-surface-variant);font-weight:600;font-size:14px;padding:8px 12px;border-radius:8px}
  .lang .ico{color:var(--primary);font-family:'Material Symbols Outlined';font-size:22px}
  .avatar{width:40px;height:40px;border-radius:9999px;background:linear-gradient(135deg,#bc5629,#9c3f12);border:2px solid var(--primary-fixed)}
</style></head>
<body>
<header>
  <div class="brand">Pathfinder</div>
  <div class="right">
    <div class="lang"><span class="ico">translate</span><span>English</span></div>
    <div class="avatar"></div>
  </div>
</header>
</body></html>
