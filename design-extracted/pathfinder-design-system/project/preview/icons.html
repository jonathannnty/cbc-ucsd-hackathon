<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">

<body>
<div class="grid">

  <span class="ico">person</span>
  <span class="ico">school</span>
  <span class="ico">description</span>

  <span class="ico">assignment_turned_in</span>
  <span class="ico">visibility</span>
  <span class="ico">check_circle</span>
  <span class="ico">translate</span>
  <span class="ico">support_agent</span>
  <span class="ico">psychology</span>
  <span class="ico">map</span>
  <span class="ico">folder_shared</span>
  <span class="ico">payments</span>
  <span class="ico">schedule</span>
  <span class="ico">medical_services</span>
</div>
<p style="margin-top:14px;font-size:12px;color:var(--on-surface-variant)">Material Symbols Outlined, FILL 0, weight 400, optical size 24. FILL flips to 1 for active nav state.</p>
</body></html>
