<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .swatch{border-radius:var(--radius);overflow:hidden;border:1px solid var(--outline-variant)}
  .chip{padding:12px;display:flex;flex-direction:column;gap:2px;height:54px;justify-content:center}
  .name{font-weight:700;font-size:13px}
  .hex{font-size:11px;opacity:.8;font-variant-numeric:tabular-nums;text-transform:uppercase}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#fff8f1;color:#201b0f;border-bottom:1px solid #ddc0b6"><div class="name">surface / bg</div><div class="hex">#FFF8F1</div></div></div>
    <div class="swatch"><div class="chip" style="background:#ffffff;color:#201b0f;border-bottom:1px solid #ddc0b6"><div class="name">container-lowest</div><div class="hex">#FFFFFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#fef2de;color:#201b0f"><div class="name">container-low</div><div class="hex">#FEF2DE</div></div></div>
    <div class="swatch"><div class="chip" style="background:#f8edd9;color:#201b0f"><div class="name">container</div><div class="hex">#F8EDD9</div></div></div>
    <div class="swatch"><div class="chip" style="background:#f2e7d3;color:#201b0f"><div class="name">container-high</div><div class="hex">#F2E7D3</div></div></div>
    <div class="swatch"><div class="chip" style="background:#ece1ce;color:#201b0f"><div class="name">container-highest</div><div class="hex">#ECE1CE</div></div></div>
    <div class="swatch"><div class="chip" style="background:#e3d9c5;color:#201b0f"><div class="name">surface-dim</div><div class="hex">#E3D9C5</div></div></div>
    <div class="swatch"><div class="chip" style="background:#353023;color:#fbf0db"><div class="name">inverse-surface</div><div class="hex">#353023</div></div></div>
  </div>
</body></html>
