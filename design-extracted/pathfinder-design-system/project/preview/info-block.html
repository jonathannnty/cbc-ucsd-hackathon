<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .info{display:flex;gap:18px;align-items:flex-start;background:rgba(184,237,179,0.25);border:1px solid rgba(57,105,59,0.2);border-radius:16px;padding:18px;max-width:560px}
  .info .ico{font-family:'Material Symbols Outlined';color:var(--secondary);font-variation-settings:'FILL' 1;font-size:24px;flex-shrink:0}
  .info .label{font-size:14px;font-weight:700;color:var(--secondary);margin-bottom:4px}
  .info p{margin:0;font-size:14px;color:var(--on-surface-variant);line-height:1.5}
</style></head>
<body>
<div class="info">
  <span class="ico">info</span>
  <div>
    <div class="label">Why do we need this?</div>
    <p>Credentialing requirements vary significantly by state and professional background. Providing accurate details ensures your pathway includes the specific boards and agencies you'll need to contact.</p>
  </div>
</div>
</body></html>
