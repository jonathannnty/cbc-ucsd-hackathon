<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{font-family:inherit;cursor:pointer;border:none;font-weight:700;font-size:14px;padding:14px 28px;border-radius:8px;letter-spacing:0.01em;transition:all .15s ease}
  .primary{background:var(--primary);color:var(--on-primary);box-shadow:var(--shadow-md)}
  .primary:hover{background:var(--primary-container)}
  .primary:active{transform:scale(.95)}
  .secondary{background:transparent;color:var(--on-surface-variant);border:1px solid var(--outline-variant)}
  .secondary:hover{background:var(--surface-variant)}
  .text{background:transparent;color:var(--primary);padding:14px 16px}
  .text:hover{background:var(--surface-container-high)}
  .pill{background:var(--primary);color:#fff;border-radius:9999px;padding:12px 32px;box-shadow:var(--shadow-md)}
</style></head>
<body>
<div class="row">
  <button class="primary">Get Started</button>
  <button class="secondary">Save for Later</button>
  <button class="text">Talk to Advisor</button>
  <button class="pill">Continue to Documents</button>
</div>
</body></html>
