<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .stack{display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:18px}
  .meta{flex:0 0 130px;color:var(--on-surface-variant);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .specimen{color:var(--on-surface)}
  .display{font:700 40px/1.2 'Atkinson Hyperlegible Next';letter-spacing:-0.02em;color:var(--primary)}
  .h-lg{font:700 32px/1.25 'Atkinson Hyperlegible Next'}
  .h-md{font:600 24px/1.3 'Atkinson Hyperlegible Next'}
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">Display · 40/700</div><div class="specimen display">Your skills travel with you.</div></div>
    <div class="row"><div class="meta">Headline-LG · 32/700</div><div class="specimen h-lg">SMART Recertification Plan</div></div>
    <div class="row"><div class="meta">Headline-MD · 24/600</div><div class="specimen h-md">Matching Your Situation</div></div>
  </div>
</body></html>
