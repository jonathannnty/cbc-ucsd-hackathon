<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .swatch{flex:1;min-width:120px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--outline-variant)}
  .chip{padding:14px 12px 12px;display:flex;flex-direction:column;gap:2px}
  .name{font-weight:700;font-size:14px;letter-spacing:.01em}
  .hex{font-size:12px;opacity:.85;font-variant-numeric:tabular-nums;text-transform:uppercase}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#9c3f12;color:#fff;height:64px"><div class="name">primary</div><div class="hex">#9C3F12</div></div></div>
    <div class="swatch"><div class="chip" style="background:#bc5629;color:#fffbff;height:64px"><div class="name">primary-container</div><div class="hex">#BC5629</div></div></div>
    <div class="swatch"><div class="chip" style="background:#ffdbce;color:#370e00;height:64px"><div class="name">primary-fixed</div><div class="hex">#FFDBCE</div></div></div>
    <div class="swatch"><div class="chip" style="background:#ffb598;color:#370e00;height:64px"><div class="name">primary-fixed-dim</div><div class="hex">#FFB598</div></div></div>
  </div>
</body></html>
