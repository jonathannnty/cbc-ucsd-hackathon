<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .panel{background:var(--surface-container-lowest);border:1px solid var(--outline-variant);border-radius:16px;padding:20px;max-width:560px}
  .progress{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .progress h3{margin:0;font-size:18px;font-weight:600}
  .pct{color:var(--primary);font-weight:700}
  .bar{width:100%;height:14px;background:var(--surface-container-highest);border-radius:9999px;overflow:hidden;margin-bottom:18px}
  .bar > div{height:100%;background:var(--primary);border-radius:9999px;width:62%}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0}
  .row span:first-child{color:var(--on-surface-variant)}
  .row span:last-child{font-weight:700}
</style></head>
<body>
<div class="panel">
  <div class="progress"><h3>Measurable Progress</h3><span class="pct">62%</span></div>
  <div class="bar"><div></div></div>
  <div class="row"><span>Documents Verified</span><span>5 / 8</span></div>
  <div class="row"><span>Exam Prep Modules</span><span>12 / 15</span></div>
  <div class="row"><span>State Approvals</span><span>1 / 4</span></div>
</div>
</body></html>
