<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .row{display:flex;gap:24px;align-items:flex-end}
  .cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:14px}
  .card{width:100%;height:80px;background:#fff;border:1px solid var(--outline-variant);border-radius:12px;display:flex;align-items:center;justify-content:center;font:600 13px/1 'Atkinson Hyperlegible Next';color:var(--on-surface-variant)}
  .l1{box-shadow:none}
  .l2{box-shadow:0 1px 2px 0 rgba(156,63,18,.06)}
  .l3{box-shadow:0 4px 12px -2px rgba(156,63,18,.10),0 2px 4px -2px rgba(156,63,18,.06)}
  .l4{box-shadow:0 12px 32px -8px rgba(156,63,18,.15),0 4px 8px -4px rgba(156,63,18,.08)}
  .glass{background:rgba(255,255,255,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(229,224,218,.5)}
  .lbl{font:700 11px/1 'Atkinson Hyperlegible Next';letter-spacing:.08em;text-transform:uppercase;color:var(--on-surface-variant)}
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="card l1">Level 1</div><div class="lbl">card · flat</div></div>
    <div class="cell"><div class="card l2">Level 2</div><div class="lbl">subtle</div></div>
    <div class="cell"><div class="card l3">Level 3</div><div class="lbl">elevated</div></div>
    <div class="cell"><div class="card glass">Glass</div><div class="lbl">help/support</div></div>
  </div>
</body></html>
