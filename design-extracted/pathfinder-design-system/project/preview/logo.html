<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .wm{display:flex;align-items:center;gap:14px}
  .wm .mark{width:48px;height:48px;border-radius:12px;background:var(--primary);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:32px;font-variation-settings:'FILL' 1}
  .wm .word{font-family:var(--font-display);font-size:40px;font-weight:700;letter-spacing:-0.02em;color:var(--primary)}
  .alt{display:flex;align-items:center;gap:14px;margin-top:18px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:12px;width:fit-content}
  .alt .mark{background:#fff;color:var(--primary)}
  .alt .word{color:#fff}
  .alt .word{font-size:32px}
</style></head>
<body>
<div class="wm">
  <span class="mark">route</span>
  <span class="word">Pathfinder</span>
</div>
<div class="alt">
  <span class="mark">route</span>
  <span class="word">Pathfinder</span>
</div>
</body></html>
