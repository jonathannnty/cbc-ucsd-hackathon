<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .stack{display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:18px}
  .meta{flex:0 0 130px;color:var(--on-surface-variant);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .b-lg{font:400 18px/1.6 'Atkinson Hyperlegible Next'}
  .b-md{font:400 16px/1.6 'Atkinson Hyperlegible Next'}
  .lbl{font:600 14px/1.4 'Atkinson Hyperlegible Next';letter-spacing:.01em}
  .eyebrow{font:700 12px/1.4 'Atkinson Hyperlegible Next';letter-spacing:.12em;text-transform:uppercase;color:var(--secondary)}
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">Body-LG · 18/400</div><div class="b-lg">Navigate the complex process of foreign credential recognition with a steadfast partner.</div></div>
    <div class="row"><div class="meta">Body-MD · 16/400</div><div class="b-md">Securely map your educational history to US standards. Line height 1.6 for second-language readers.</div></div>
    <div class="row"><div class="meta">Label-MD · 14/600</div><div class="lbl">Continue to Documents</div></div>
    <div class="row"><div class="meta">Eyebrow</div><div class="eyebrow">Strategy Phase</div></div>
  </div>
</body></html>
