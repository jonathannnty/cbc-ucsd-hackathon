<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--background);font-family:var(--font-body);color:var(--on-surface)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:72px;background:#fff;border:1px solid var(--outline-variant)}
  .lbl{font:700 11px/1 'Atkinson Hyperlegible Next';letter-spacing:.06em;text-transform:uppercase;color:var(--on-surface-variant)}
  .val{font:600 12px/1 'Atkinson Hyperlegible Next';color:var(--on-surface)}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="lbl">sm</div><div class="val">4px</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="lbl">default</div><div class="val">8px</div></div>
    <div class="cell"><div class="box" style="border-radius:12px"></div><div class="lbl">md</div><div class="val">12px</div></div>
    <div class="cell"><div class="box" style="border-radius:16px"></div><div class="lbl">lg</div><div class="val">16px</div></div>
    <div class="cell"><div class="box" style="border-radius:24px"></div><div class="lbl">xl</div><div class="val">24px</div></div>
    <div class="cell"><div class="box" style="border-radius:9999px"></div><div class="lbl">full</div><div class="val">pill</div></div>
  </div>
</body></html>
